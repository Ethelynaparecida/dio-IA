<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculadora de Emissão de CO2</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="page-header">
      <div class="page-header__content">
        <h1 class="page-header__title">🍃 Calculadora de Emissão de CO2</h1>
        <p class="page-header__subtitle">
          Calcule as emissões de CO2 para suas viagens de transporte com base na rota e no modo de transporte.
        </p>
      </div>
    </header>

    <main>
      <section class="calculator">
        <form id="calculator-form" class="calculator__form" novalidate>
          <div class="calculator__field calculator__field--full">
            <label class="calculator__label" for="origin">Origem</label>
            <input
              id="origin"
              name="origin"
              class="calculator__input"
              list="cities-list"
              type="text"
              autocomplete="off"
              placeholder="Digite a cidade de origem"
            />
            <datalist id="cities-list"></datalist>
          </div>

          <div class="calculator__field calculator__field--full">
            <label class="calculator__label" for="destination">Destino</label>
            <input
              id="destination"
              name="destination"
              class="calculator__input"
              list="cities-list"
              type="text"
              autocomplete="off"
              placeholder="Digite a cidade de destino"
            />
          </div>

          <div class="calculator__field calculator__field--full">
            <label class="calculator__label" for="distance">Distância</label>
            <input
              id="distance"
              name="distance"
              class="calculator__input"
              type="number"
              readonly
              placeholder="Distância será calculada automaticamente"
            />
            <p class="calculator__help">A distância será preenchida automaticamente</p>
          </div>

          <div class="calculator__field calculator__field--inline">
            <input
              id="manual-distance"
              name="manual-distance"
              class="calculator__checkbox"
              type="checkbox"
            />
            <label class="calculator__checkbox-label" for="manual-distance">
              Inserir distância manualmente
            </label>
          </div>

          <fieldset class="calculator__fieldset">
            <legend class="calculator__legend">Modo de transporte</legend>
            <div class="calculator__transport-grid">
              <label class="calculator__transport-option" for="transport-bicycle">
                <input
                  id="transport-bicycle"
                  class="calculator__transport-input"
                  type="radio"
                  name="transport"
                  value="bicycle"
                />
                <span class="calculator__transport-icon">🚲</span>
                <span class="calculator__transport-text">Bicicleta</span>
              </label>

              <label class="calculator__transport-option" for="transport-car">
                <input
                  id="transport-car"
                  class="calculator__transport-input"
                  type="radio"
                  name="transport"
                  value="car"
                  checked
                />
                <span class="calculator__transport-icon">🚗</span>
                <span class="calculator__transport-text">Carro</span>
              </label>

              <label class="calculator__transport-option" for="transport-bus">
                <input
                  id="transport-bus"
                  class="calculator__transport-input"
                  type="radio"
                  name="transport"
                  value="bus"
                />
                <span class="calculator__transport-icon">🚌</span>
                <span class="calculator__transport-text">Ônibus</span>
              </label>

              <label class="calculator__transport-option" for="transport-truck">
                <input
                  id="transport-truck"
                  class="calculator__transport-input"
                  type="radio"
                  name="transport"
                  value="truck"
                />
                <span class="calculator__transport-icon">🚚</span>
                <span class="calculator__transport-text">Caminhão</span>
              </label>
            </div>
          </fieldset>

          <div class="calculator__actions">
            <button type="submit" class="calculator__submit-button">
              Calcular emissão
            </button>
          </div>
        </form>
      </section>

      <section id="result" class="result hidden">
        <div id="result-content" class="result__content"></div>
      </section>

      <section id="comparison" class="comparison hidden">
        <div id="comparison-content" class="comparison__content"></div>
      </section>

      <section id="carbon-credits" class="carbon-credits hidden">
        <div id="carbon-credits-content" class="carbon-credits__content"></div>
      </section>
    </main>

    <footer class="page-footer">
      <p class="page-footer__text">Desenvolvido para Projeto Copilot para DIO</p>
    </footer>

    <script src="js/routes-data.js"></script>
    <script src="js/config.js"></script>
    <script src="js/calculator.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
